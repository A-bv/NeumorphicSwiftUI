name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build & test (SwiftPM)
        run: swift test

      - name: Build for iOS
        run: |
          xcodebuild \
            -scheme NeumorphicSwiftUI \
            -destination 'generic/platform=iOS' \
            build
